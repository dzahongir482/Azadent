<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Aza Dent</title>
    
    <link rel="stylesheet" href="style_admin.css">
</head>
<body>
    <div id="admin-app">
        <section id="login-screen">
            <form class="form" id="login-form">
                <h1 id="heading">Админ-панель Aza Dent</h1>
                
                <div class="field">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M13.106 7.222c0-2.967-2.249-5.032-5.482-5.032-3.35 0-5.646 2.318-5.646 5.702 0 3.493 2.235 5.708 5.762 5.708.862 0 1.689-.123 2.304-.335v-.862c-.43.199-1.354.328-2.29.328-2.926 0-4.813-1.88-4.813-4.798 0-2.844 1.921-4.881 4.594-4.881 2.735 0 4.608 1.688 4.608 4.156 0 1.682-.554 2.769-1.416 2.769-.492 0-.772-.28-.772-.76V5.206H8.923v.834h-.11c-.266-.595-.881-.964-1.6-.964-1.4 0-2.378 1.162-2.378 2.823 0 1.737.957 2.906 2.379 2.906.8 0 1.415-.39 1.709-1.087h.11c.081.67.703 1.148 1.503 1.148 1.572 0 2.57-1.415 2.57-3.643zm-7.177.704c0-1.197.54-1.907 1.456-1.907.93 0 1.524.738 1.524 1.907S8.308 9.84 7.371 9.84c-.895 0-1.442-.725-1.442-1.914z"></path>
                    </svg>
                    <input autocomplete="on" placeholder="Email" class="input-field" type="email" id="admin-email" required>
                </div>
                
                <div class="field">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path>
                    </svg>
                    <input placeholder="Пароль" class="input-field" type="password" id="admin-password" style="padding-right: 48px;" required>
                    <button type="button" id="toggle-password" class="toggle-password-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                
                <div class="btn">
                    <button type="submit" class="button1">Войти в систему</button>
                </div>
            </form>
        </section>

        <section id="dashboard" style="display:none;">
            <header>
                <h1>Заявки клиентов</h1>
                <button class="btn-logout" onclick="logout()">Выйти</button>
            </header>
            <table class="leads-table">
                <thead>
                    <tr>
                        <th>Имя</th>
                        <th>Телефон</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody id="leads-body">
                    </tbody>
            </table>
        </section>
    </div>
    <!-- УПРАВЛЕНИЕ ПОРТФОЛИО И ОТЗЫВАМИ ВРАЧЕЙ -->
<div id="content-management-section" style="margin-top: 50px; padding-top: 30px; border-top: 2px solid rgba(255,255,255,0.1); color: #fff; font-family: 'Inter', sans-serif;">
    
    <h2 style="font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 25px; color: #10b981;">Добавление материалов на сайт</h2>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
        
        <!-- Форма 1: Кейсы ДО / ПОСЛЕ -->
        <form id="portfolio-upload-form" style="background: rgba(255,255,255,0.03); padding: 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
            <h3 style="margin-top:0; margin-bottom: 20px; color: #e2e8f0;">1. Загрузить работу (До/После)</h3>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.9rem;">Выберите врача:</label>
                <select id="adm-portfolio-doctor" style="width: 100%; padding: 10px; border-radius: 6px; background: #1b263b; color: #fff; border: 1px solid #415a77; font-size: 0.95rem;">
                    <option value="askar">Аскар Зафарович</option>
                    <option value="ivanov">Иван Иванов</option>
                    <option value="petrov">Петр Петров</option>
                </select>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.9rem;">Описание клинического случая:</label>
                <textarea id="adm-work-desc" placeholder="Исправление скученности зубов на брекет-системе. Срок лечения — 1.5 года." style="width: 100%; padding: 10px; border-radius: 6px; background: #1b263b; color: #fff; border: 1px solid #415a77; min-height: 80px; font-family: inherit; box-sizing: border-box; font-size: 0.95rem;"></textarea>
            </div>
            
            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <div style="flex: 1;">
                    <label style="display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.85rem;">Фото ДО:</label>
                    <input type="file" id="adm-photo-before" accept="image/*" style="width: 100%; color: #cbd5e1; font-size: 0.85rem;">
                </div>
                <div style="flex: 1;">
                    <label style="display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.85rem;">Фото ПОСЛЕ:</label>
                    <input type="file" id="adm-photo-after" accept="image/*" style="width: 100%; color: #cbd5e1; font-size: 0.85rem;">
                </div>
            </div>
            
            <button type="button" onclick="handlePortfolioUpload()" style="background: #10b981; color: #fff; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 0.95rem; transition: 0.2s;">Опубликовать на страницу врача</button>
        </form>

        <!-- Форма 2: Отзывы пациентов -->
        <form id="review-upload-form" style="background: rgba(255,255,255,0.03); padding: 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
            <h3 style="margin-top:0; margin-bottom: 20px; color: #e2e8f0;">2. Загрузить отзыв</h3>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.9rem;">Выберите врача:</label>
                <select id="adm-review-doctor" style="width: 100%; padding: 10px; border-radius: 6px; background: #1b263b; color: #fff; border: 1px solid #415a77; font-size: 0.95rem;">
                    <option value="askar">Аскар Зафарович</option>
                    <option value="ivanov">Иван Иванов</option>
                    <option value="petrov">Петр Петров</option>
                </select>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.9rem;">Имя пациента:</label>
                <input type="text" id="adm-review-author" placeholder="Иванов И." style="width: 100%; padding: 10px; border-radius: 6px; background: #1b263b; color: #fff; border: 1px solid #415a77; box-sizing: border-box; font-size: 0.95rem;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.85rem;">Скриншот / Фото отзыва (если есть):</label>
                <input type="file" id="adm-photo-review" accept="image/*" style="color: #cbd5e1; font-size: 0.85rem;">
            </div>
            
            <button type="button" onclick="handleReviewUpload()" style="background: #10b981; color: #fff; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 0.95rem; transition: 0.2s;">Опубликовать отзыв</button>
        </form>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="main.js"></script>
</body>
</html>
